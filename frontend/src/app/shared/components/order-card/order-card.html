<div class="space-y-4">
  @for (order of orders; track id) {
    <div class="border rounded-2xl p-4 shadow-sm bg-white flex flex-col gap-3">
      <!-- Order Header -->
      <div class="flex justify-between items-center">
        <h3 class="font-semibold text-gray-700">Order #{{ id }}</h3>

        <span class="text-xs px-2 py-1 rounded-full bg-green-100 text-green-600">
          {{ order.status }}
        </span>
      </div>

      <!-- Items -->
      <div class="space-y-2">
        @for (item of order.items; track item.id) {
          <div class="flex items-center gap-3">
            <img [src]="item.image" class="w-10 h-10 object-cover rounded-md" />

            <div class="flex-1">
              <p class="text-sm font-medium text-gray-700 truncate">
                {{ item.name }}
              </p>
              <p class="text-xs text-gray-400">x{{ order.qty }}</p>
            </div>

            <div class="text-sm font-semibold text-primary">
              {{ item.priceCents / 100 }}
            </div>
          </div>
        }
      </div>

      <!-- Footer -->
      <div class="flex justify-between items-center border-t pt-3">
        <span class="text-sm text-gray-500">Total</span>
        <span class="font-bold text-primary">
          {{ order.qty }}
        </span>
      </div>
    </div>
  }
</div>
