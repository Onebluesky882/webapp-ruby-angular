<!-- Total Price Section -->
<section
  class="absolute bottom-0 max-w-full h-[12%] mx-auto mt-10 bg-white border-t-4 border-t-green-400 p-6"
>
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6">
    <!-- Summary -->
    <div>
      <h2 class="text-2xl font-bold text-gray-800 mb-2">Order Summary</h2>
      <p class="text-sm text-gray-500">ตรวจสอบรายการสินค้าและดำเนินการชำระเงิน</p>
    </div>
    <!-- Total -->
    <div class="flex flex-col items-start md:items-end gap-2">
      <span class="text-sm text-gray-400">Total Price</span>

      <div class="text-3xl font-extrabold text-primary">
        {{ totalPrice }}
      </div>

      <button
        (click)="setPaymentPopup(true)"
        class="mt-2 cursor-pointer bg-primary hover:opacity-90 active:scale-[0.98] transition-all text-white px-6 py-3 rounded-xl font-semibold shadow-md"
      >
        Proceed to Checkout
      </button>
    </div>
  </div>
</section>
