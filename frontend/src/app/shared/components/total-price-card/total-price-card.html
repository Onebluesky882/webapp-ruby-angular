<!-- Checkout Sticky Footer -->
<!-- ใช้ fixed bottom-0 เพื่อให้ล็อกติดขอบล่างของหน้าจอเสมอ -->
<section
  class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-gray-100 shadow-[0_-8px_30px_rgb(0,0,0,0.04)] z-50 transition-all duration-300"
>
  <div class="max-w-7xl mx-auto px-4 py-4 md:py-6">
    <div class="flex items-center justify-between gap-4">
      <!-- Left: Summary Info (ซ่อนในมือถือขนาดเล็กมากเพื่อประหยัดพื้นที่) -->
      <div class="hidden sm:block">
        <h2 class="text-lg md:text-xl font-black text-dark tracking-tight italic">Order Summary</h2>
        <p class="text-xs text-secondary font-medium">รวมรายการสินค้าทั้งหมดของคุณ</p>
      </div>

      <!-- Right: Price & CTA -->
      <div class="flex items-center gap-4 md:gap-8 ml-auto">
        <!-- Total Section -->
        <div class="text-right">
          <span
            class="block text-[10px] md:text-xs font-bold text-secondary uppercase tracking-widest"
            >ยอดชำระสุทธิ</span
          >
          <div class="flex items-baseline gap-1">
            <span class="text-sm font-bold text-primary italic">฿</span>
            <span class="text-2xl md:text-4xl font-black text-primary tracking-tighter">
              {{ totalPrice }}
            </span>
          </div>
        </div>

        <!-- Checkout Button -->
        <button
          (click)="setPaymentPopup.emit(true)"
          class="bg-primary hover:bg-blue-700 active:scale-95 transition-all text-white px-6 md:px-10 py-3 md:py-4 rounded-2xl font-bold shadow-lg shadow-blue-100 flex items-center gap-2 group"
        >
          <span class="text-sm md:text-base uppercase tracking-wider">ชำระเงิน</span>
          <!-- Icon ลูกศรที่จะขยับเมื่อ Hover -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 group-hover:translate-x-1 transition-transform"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M14 5l7 7m0 0l-7 7m7-7H3"
            />
          </svg>
        </button>
      </div>
    </div>
  </div>
</section>

<!-- ** สำคัญมาก ** -->
<!-- ใส่พื้นที่ว่างด้านล่างของเนื้อหาหลัก เพื่อไม่ให้ส่วนล่างสุดของรายการสินค้าถูก Checkout Bar บัง -->
<div class="h-32 md:h-40"></div>
