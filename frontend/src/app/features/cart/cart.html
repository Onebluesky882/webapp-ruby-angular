@for (item of cartItems(); track $index) {
  <app-cart-item
    [item]="item"
    (quantityChange)="updateQuantity(item, $event)"
    (removeItem)="removeCartItem($event)"
  />
}

<!-- total price -->
<app-total-price-card
  [totalPrice]="totalPrice"
  [paymentPopupVisible]="paymentPopupVisible"
  [setPaymentPopup]="setPaymentPopup"
/>

<!-- Payment popup -->
@if (paymentPopupVisible) {
  <app-payment-card-popup (paySuccess)="paySuccessFull()"></app-payment-card-popup>
}
