@for (item of cartItems(); track $index) {
  <app-cart-item
    [item]="item"
    (quantityChange)="updateQuantity(item, $event)"
    (removeItem)="removeCartItem($event)"
  />
}

<!-- Payment popup -->
@if (cartStore.paymentPopupVisible()) {
  <app-payment-card-popup
    [totalPrice]="cartStore.totalPrice()"
    (paySuccess)="handlePaySuccess()"
  ></app-payment-card-popup>
}
